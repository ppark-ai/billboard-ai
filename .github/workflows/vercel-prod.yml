name: Deploy to Vercel (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: team_q858X645DNFoGwH3kQ2c5h89
      VERCEL_PROJECT_ID: prj_89lIWgxACyUduhNG47R9y6f9o0Hn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build winner pipeline + stage prebuilt static output
        run: |
          PYTHONPATH=src python3 scripts/run_final_release_pipeline.py

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
